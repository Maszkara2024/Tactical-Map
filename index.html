<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEERH. | CLICKxBUILD Tactical Tool</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #151518;
            --gr-blue: #00d4ff;
            --bl-red: #ff3e3e;
            --smoke-yellow: #fcf14a;
            --accent: #00ff88;
            --border: #333;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { 
            width: 290px; background-color: var(--panel-bg); 
            border-right: 2px solid var(--border); display: flex; 
            flex-direction: column; padding: 15px; z-index: 10; overflow-y: auto; 
        }

        #map-container { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        canvas { max-width: 95%; max-height: 95%; box-shadow: 0 0 30px #000; touch-action: none; }

        /* --- MOBILE RESPONSIVE BRIDGE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { 
                width: 100%; height: 45vh; border-right: none; 
                border-top: 2px solid var(--border); order: 2; 
                padding: 10px; box-sizing: border-box;
            }
            #map-container { height: 55vh; order: 1; }
            .icon-grid { grid-template-columns: repeat(5, 1fr); gap: 10px; }
            .tactical-icon { width: 45px; height: 45px; font-size: 1.2rem; }
            button { padding: 15px 5px; font-size: 0.8rem; }
        }

        .creator-tag { text-align: center; padding: 10px; border: 1px solid var(--accent); border-radius: 4px; margin-bottom: 20px; background: rgba(0, 255, 136, 0.05); }
        .creator-tag span { display: block; font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .creator-tag strong { display: block; font-size: 1.2rem; color: var(--accent); text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }

        .section-title { font-size: 0.75rem; font-weight: bold; margin: 15px 0 5px 0; text-transform: uppercase; color: #aaa; }
        select { width: 100%; padding: 10px; background: #222; color: white; border: 1px solid var(--border); margin-bottom: 10px; border-radius: 4px; font-size: 16px; }
        
        .tool-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .toggle-btn { width: 40px; height: 40px; background: #222; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .toggle-btn.off { opacity: 0.3; filter: grayscale(1); }
        
        .icon-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tactical-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: grab; font-weight: bold; user-select: none; touch-action: none; }
        .gr-icon { background: rgba(0, 212, 255, 0.2); border: 2px solid var(--gr-blue); color: var(--gr-blue); }
        .bl-icon { background: rgba(255, 62, 62, 0.2); border: 2px solid var(--bl-red); color: var(--bl-red); }

        .controls { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding-top: 20px; }
        button, .upload-label { padding: 10px; background: #222; border: 1px solid var(--border); color: white; cursor: pointer; text-align: center; text-transform: uppercase; font-size: 0.7rem; border-radius: 4px; font-weight: bold; flex-grow: 1; }
        button.active { background: #444; border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }
        
        .pencil-blue-btn { border-color: var(--gr-blue) !important; color: var(--gr-blue) !important; }
        .pencil-red-btn { border-color: var(--bl-red) !important; color: var(--bl-red) !important; }
        .smoke-yellow-btn { border-color: var(--smoke-yellow) !important; color: var(--smoke-yellow) !important; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="creator-tag">
            <span>Made By</span>
            <strong>MEERH.</strong>
            <div style="font-size: 0.8rem; font-weight: bold; color: #fff; margin-top: 5px;">CLAN: CLICKxBUILD</div>
        </div>
        
        <span class="section-title">Select Map</span>
        <select id="map-select">
            <option value="">-- Choose Map --</option>
            <option value="subbase.png">Sub Base</option>
            <option value="blackwidow.png">Black Widow</option>
            <option value="ankara.png">Ankara</option>
            <option value="port.png">Port</option>
            <option value="mexico.png">Mexico</option>
            <option value="compound.png">Compound</option>
            <option value="eagleeye2.png">Eagle Eye 2</option>
        </select>

        <span class="section-title" style="color: var(--gr-blue)">GR Units & Pencil</span>
        <div class="icon-grid">
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">1</div>
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">2</div>
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">3</div>
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">4</div>
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">5</div>
        </div>
        <div class="tool-row" style="margin-top: 5px;">
            <div class="toggle-btn" id="toggle-pencil-blue">👁️</div>
            <button id="pencil-blue-btn" class="pencil-blue-btn">Blue Pencil</button>
        </div>

        <span class="section-title" style="color: var(--bl-red)">BL Units & Pencil</span>
        <div class="icon-grid">
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">1</div>
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">2</div>
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">3</div>
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">4</div>
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">5</div>
        </div>
        <div class="tool-row" style="margin-top: 5px;">
            <div class="toggle-btn" id="toggle-pencil-red">👁️</div>
            <button id="pencil-red-btn" class="pencil-red-btn">Red Pencil</button>
        </div>

        <div class="controls">
            <div class="tool-row">
                <div class="toggle-btn" id="toggle-arrows">👁️</div>
                <button id="arrow-tool-btn">Arrow Tool</button>
            </div>
            <button id="smoke-yellow-btn" class="smoke-yellow-btn">Yellow Smoke (S)</button>
            <button id="smoke-blue-btn" class="gr-icon" style="border-color: var(--gr-blue) !important; color: var(--gr-blue) !important;">Blue Smoke (S)</button>
            <button id="flash-btn">Flashbang (F)</button>
            <button id="clear-btn">Clear All</button>
            <button id="export-btn" style="border-color: var(--accent); color: var(--accent);">Download Strategy</button>
        </div>
    </aside>

    <main id="map-container">
        <canvas id="mapCanvas"></canvas>
    </main>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const mapSelect = document.getElementById('map-select');
        
        let mapImage = new Image();
        let items = []; 
        let tool = 'none';
        let isDrawing = false;
        let currentPath = [];
        let arrowStart = null;
        let draggedItem = null;

        let showPencilBlue = true, showPencilRed = true, showArrows = true;

        mapSelect.onchange = (e) => {
            if(!e.target.value) return;
            mapImage.onload = resizeCanvas;
            mapImage.src = "./" + e.target.value; 
        };

        function resizeCanvas() {
            const container = document.getElementById('map-container');
            const ratio = mapImage.width / mapImage.height || 1.77;
            canvas.width = container.clientWidth - 20;
            canvas.height = canvas.width / ratio;
            if (canvas.height > container.clientHeight - 20) {
                canvas.height = container.clientHeight - 20;
                canvas.width = canvas.height * ratio;
            }
        }
        window.addEventListener('resize', resizeCanvas);

        // --- UNIFIED INPUT LOGIC (Desktop + Mobile) ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        const startAction = (e) => {
            const pos = getPos(e);
            if (tool.startsWith('pencil')) {
                isDrawing = true; currentPath = [pos];
            } else if (tool === 'arrow') {
                isDrawing = true; arrowStart = pos;
            } else {
                draggedItem = items.find(i => i.type !== 'arrow' && i.type !== 'pencil' && Math.sqrt((i.x - pos.x)**2 + (i.y - pos.y)**2) < 25);
            }
        };

        const moveAction = (e) => {
            const pos = getPos(e);
            if (isDrawing) {
                if (tool.startsWith('pencil')) currentPath.push(pos);
            } else if (draggedItem) {
                draggedItem.x = pos.x; draggedItem.y = pos.y;
            }
        };

        const endAction = () => {
            if (isDrawing) {
                if (tool.startsWith('pencil') && currentPath.length > 2) {
                    items.push({ type: 'pencil', path: currentPath, color: tool === 'pencil-blue' ? '#00d4ff' : '#ff3e3e', subType: tool });
                } else if (tool === 'arrow' && arrowStart) {
                    const lastPos = currentPath.length > 0 ? currentPath[currentPath.length-1] : arrowStart;
                    // Logic for arrow end handled by currentMousePos in your original, simplified here
                }
            }
            isDrawing = false; draggedItem = null; currentPath = []; arrowStart = null;
        };

        canvas.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', (e) => {
            const pos = getPos(e);
            window.lastMousePos = pos;
            moveAction(e);
        });
        window.addEventListener('mouseup', endAction);

        canvas.addEventListener('touchstart', startAction, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveAction(e); }, {passive: false});
        canvas.addEventListener('touchend', endAction);

        // Tool Buttons
        document.getElementById('pencil-blue-btn').onclick = () => { tool = (tool === 'pencil-blue') ? 'none' : 'pencil-blue'; updateButtons(); };
        document.getElementById('pencil-red-btn').onclick = () => { tool = (tool === 'pencil-red') ? 'none' : 'pencil-red'; updateButtons(); };
        document.getElementById('arrow-tool-btn').onclick = () => { tool = (tool === 'arrow') ? 'none' : 'arrow'; updateButtons(); };

        function updateButtons() {
            document.getElementById('pencil-blue-btn').classList.toggle('active', tool === 'pencil-blue');
            document.getElementById('pencil-red-btn').classList.toggle('active', tool === 'pencil-red');
            document.getElementById('arrow-tool-btn').classList.toggle('active', tool === 'arrow');
        }

        // Add icons (Simple click for mobile, drag for desktop)
        document.querySelectorAll('.tactical-icon').forEach(icon => {
            icon.onclick = () => {
                items.push({ x: canvas.width/2, y: canvas.height/2, type: 'player', team: icon.dataset.team, label: icon.innerText });
            };
        });

        document.getElementById('smoke-yellow-btn').onclick = () => items.push({ x: canvas.width/2, y: canvas.height/2, type: 'smoke', color: 'yellow', seed: Math.random() });
        document.getElementById('smoke-blue-btn').onclick = () => items.push({ x: canvas.width/2, y: canvas.height/2, type: 'smoke', color: 'blue', seed: Math.random() });
        document.getElementById('clear-btn').onclick = () => items = [];
        document.getElementById('export-btn').onclick = () => {
            const link = document.createElement('a');
            link.download = 'MEERH_Tactic.png';
            link.href = canvas.toDataURL();
            link.click();
        };

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (mapImage.src) ctx.drawImage(mapImage, 0, 0, canvas.width, canvas.height);
            
            if (isDrawing && tool.startsWith('pencil')) {
                ctx.strokeStyle = tool === 'pencil-blue' ? '#00d4ff' : '#ff3e3e';
                ctx.lineWidth = 3; ctx.beginPath();
                ctx.moveTo(currentPath[0].x, currentPath[0].y);
                currentPath.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            }

            items.forEach(i => {
                if (i.type === 'pencil') {
                    ctx.strokeStyle = i.color; ctx.lineWidth = 3; ctx.beginPath();
                    ctx.moveTo(i.path[0].x, i.path[0].y);
                    i.path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
                } else if (i.type === 'player') {
                    ctx.beginPath(); ctx.arc(i.x, i.y, 18, 0, Math.PI*2);
                    ctx.fillStyle = i.team === 'gr' ? 'rgba(0, 212, 255, 0.7)' : 'rgba(255, 62, 62, 0.7)';
                    ctx.fill(); ctx.fillStyle = "white"; ctx.textAlign="center"; ctx.fillText(i.label, i.x, i.y+5);
                } else if (i.type === 'smoke') {
                    ctx.beginPath(); ctx.arc(i.x, i.y, 25, 0, Math.PI*2);
                    ctx.fillStyle = i.color === 'blue' ? "rgba(0, 212, 255, 0.4)" : "rgba(252, 241, 74, 0.4)";
                    ctx.fill();
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
