<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEERH. | CLICKxBUILD Tactical Tool</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #151518;
            --gr-blue: #00d4ff;
            --bl-red: #ff3e3e;
            --smoke-yellow: #fcf14a;
            --accent: #00ff88;
            --border: #333;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 290px; background-color: var(--panel-bg); border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 15px; z-index: 10; overflow-y: auto; }
        
        .creator-tag { text-align: center; padding: 10px; border: 1px solid var(--accent); border-radius: 4px; margin-bottom: 20px; background: rgba(0, 255, 136, 0.05); }
        .creator-tag span { display: block; font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .creator-tag strong { display: block; font-size: 1.2rem; color: var(--accent); text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }

        .section-title { font-size: 0.75rem; font-weight: bold; margin: 15px 0 5px 0; text-transform: uppercase; color: #aaa; }
        
        select { width: 100%; padding: 10px; background: #222; color: white; border: 1px solid var(--border); margin-bottom: 10px; border-radius: 4px; }
        
        .tool-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .toggle-btn { width: 35px; height: 35px; background: #222; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: 0.2s; }
        .toggle-btn.off { opacity: 0.3; filter: grayscale(1); }
        
        .icon-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tactical-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: grab; font-weight: bold; user-select: none; }
        .gr-icon { background: rgba(0, 212, 255, 0.2); border: 2px solid var(--gr-blue); color: var(--gr-blue); }
        .bl-icon { background: rgba(255, 62, 62, 0.2); border: 2px solid var(--bl-red); color: var(--bl-red); }

        .controls { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding-top: 20px; }
        button, .upload-label { padding: 10px; background: #222; border: 1px solid var(--border); color: white; cursor: pointer; text-align: center; text-transform: uppercase; font-size: 0.7rem; border-radius: 4px; font-weight: bold; flex-grow: 1; }
        
        button.active { background: #444; border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }
        
        .pencil-blue-btn { border-color: var(--gr-blue) !important; color: var(--gr-blue) !important; }
        .pencil-red-btn { border-color: var(--bl-red) !important; color: var(--bl-red) !important; }
        .smoke-yellow-btn { border-color: var(--smoke-yellow) !important; color: var(--smoke-yellow) !important; }

        #map-container { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        canvas { max-width: 95%; max-height: 95%; box-shadow: 0 0 30px #000; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="creator-tag">
            <span>Made By</span>
            <strong>MEERH.</strong>
            <div style="font-size: 0.8rem; font-weight: bold; color: #fff; margin-top: 5px;">CLAN: CLICKxBUILD</div>
        </div>
        
        <span class="section-title">Select Map</span>
        <select id="map-select">
            <option value="">-- Choose Map --</option>
            <option value="subbase.png">Sub Base</option>
            <option value="blackwidow.png">Black Widow</option>
            <option value="ankara.png">Ankara</option>
            <option value="port.png">Port</option>
            <option value="mexico.png">Mexico</option>
            <option value="compound.png">Compound</option>
            <option value="eagleeye2.png">Eagle Eye 2</option>
        </select>

        <span class="section-title" style="color: var(--gr-blue)">GR Pencil & Units</span>
        <div class="icon-grid">
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">1</div>
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">2</div>
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">3</div>
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">4</div>
            <div class="tactical-icon gr-icon" draggable="true" data-team="gr">5</div>
        </div>
        <div class="tool-row" style="margin-top: 5px;">
            <div class="toggle-btn" id="toggle-pencil-blue" title="Toggle Blue Pencil Visibility">👁️</div>
            <button id="pencil-blue-btn" class="pencil-blue-btn">Blue Pencil</button>
        </div>

        <span class="section-title" style="color: var(--bl-red)">BL Pencil & Units</span>
        <div class="icon-grid">
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">1</div>
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">2</div>
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">3</div>
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">4</div>
            <div class="tactical-icon bl-icon" draggable="true" data-team="bl">5</div>
        </div>
        <div class="tool-row" style="margin-top: 5px;">
            <div class="toggle-btn" id="toggle-pencil-red" title="Toggle Red Pencil Visibility">👁️</div>
            <button id="pencil-red-btn" class="pencil-red-btn">Red Pencil</button>
        </div>

        <div class="controls">
            <div class="tool-row">
                <div class="toggle-btn" id="toggle-arrows" title="Toggle Arrows Visibility">👁️</div>
                <button id="arrow-tool-btn">Arrow Tool</button>
            </div>
            <button id="smoke-yellow-btn" class="smoke-yellow-btn">Yellow Smoke (S)</button>
            <button id="smoke-blue-btn" class="gr-icon" style="border-color: var(--gr-blue) !important; color: var(--gr-blue) !important;">Blue Smoke (S)</button>
            <button id="flash-btn">Flashbang (F)</button>
            <label class="upload-label" for="file-input">Manual Upload</label>
            <input type="file" id="file-input" accept="image/*">
            <button id="clear-btn">Clear All</button>
            <button id="export-btn" style="border-color: var(--accent); color: var(--accent);">Download Strategy</button>
        </div>
    </aside>

    <main id="map-container">
        <canvas id="mapCanvas"></canvas>
    </main>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const mapSelect = document.getElementById('map-select');
        const fileInput = document.getElementById('file-input');
        
        const pencilBlueBtn = document.getElementById('pencil-blue-btn');
        const pencilRedBtn = document.getElementById('pencil-red-btn');
        const arrowBtn = document.getElementById('arrow-tool-btn');
        
        const togglePencilBlue = document.getElementById('toggle-pencil-blue');
        const togglePencilRed = document.getElementById('toggle-pencil-red');
        const toggleArrows = document.getElementById('toggle-arrows');

        let mapImage = new Image();
        let items = []; 
        let tool = 'none';
        let isDrawing = false;
        let currentPath = [];
        let arrowStart = null;
        let currentMousePos = null;
        let draggedItem = null;

        // Visibility states
        let showPencilBlue = true;
        let showPencilRed = true;
        let showArrows = true;

        mapSelect.onchange = (e) => {
            if(!e.target.value) return;
            const tempImg = new Image();
            tempImg.onload = () => { mapImage = tempImg; resizeCanvas(); };
            tempImg.src = "./" + e.target.value; 
        };

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = new Image();
                img.onload = () => { mapImage = img; resizeCanvas(); };
                img.src = f.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function resizeCanvas() {
            const container = document.getElementById('map-container');
            const ratio = mapImage.width / mapImage.height || 1.77;
            canvas.width = container.clientWidth - 40;
            canvas.height = canvas.width / ratio;
            if (canvas.height > container.clientHeight - 40) {
                canvas.height = container.clientHeight - 40;
                canvas.width = canvas.height * ratio;
            }
        }

        // Tool Selection
        pencilBlueBtn.onclick = () => { tool = (tool === 'pencil-blue') ? 'none' : 'pencil-blue'; updateButtons(); };
        pencilRedBtn.onclick = () => { tool = (tool === 'pencil-red') ? 'none' : 'pencil-red'; updateButtons(); };
        arrowBtn.onclick = () => { tool = (tool === 'arrow') ? 'none' : 'arrow'; updateButtons(); };

        // Toggle Visibility
        togglePencilBlue.onclick = () => { showPencilBlue = !showPencilBlue; togglePencilBlue.classList.toggle('off', !showPencilBlue); };
        togglePencilRed.onclick = () => { showPencilRed = !showPencilRed; togglePencilRed.classList.toggle('off', !showPencilRed); };
        toggleArrows.onclick = () => { showArrows = !showArrows; toggleArrows.classList.toggle('off', !showArrows); };

        function updateButtons() {
            pencilBlueBtn.classList.toggle('active', tool === 'pencil-blue');
            pencilRedBtn.classList.toggle('active', tool === 'pencil-red');
            arrowBtn.classList.toggle('active', tool === 'arrow');
            canvas.style.cursor = (tool !== 'none') ? "crosshair" : "default";
        }

        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            if (tool.startsWith('pencil')) {
                isDrawing = true;
                currentPath = [{x, y}];
            } else if (tool === 'arrow') {
                isDrawing = true;
                arrowStart = {x, y};
            } else {
                draggedItem = items.find(i => i.type !== 'arrow' && i.type !== 'pencil' && Math.sqrt((i.x - x)**2 + (i.y - y)**2) < 25);
            }
        };

        window.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            currentMousePos = {x, y};
            if (isDrawing && tool !== 'none') {
                if (tool.startsWith('pencil')) currentPath.push({x, y});
            } else if (draggedItem) {
                draggedItem.x = x; draggedItem.y = y;
            }
        };

        window.onmouseup = () => {
            if (isDrawing) {
                if (tool.startsWith('pencil') && currentPath.length > 2) {
                    items.push({ type: 'pencil', path: currentPath, color: tool === 'pencil-blue' ? '#00d4ff' : '#ff3e3e', subType: tool });
                } else if (tool === 'arrow' && arrowStart) {
                    items.push({ type: 'arrow', startX: arrowStart.x, startY: arrowStart.y, endX: currentMousePos.x, endY: currentMousePos.y });
                }
            }
            isDrawing = false; draggedItem = null; currentPath = []; arrowStart = null;
        };

        document.querySelectorAll('.tactical-icon').forEach(icon => {
            icon.ondragstart = (e) => { window.dragData = { team: icon.dataset.team, label: icon.innerText }; };
        });

        canvas.ondragover = (e) => e.preventDefault();
        canvas.ondrop = (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            items.push({ x, y, type: 'player', team: window.dragData.team, label: window.dragData.label });
        };

        canvas.oncontextmenu = (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            items = items.filter(i => {
                if(i.type === 'arrow') return Math.sqrt((i.endX - x)**2 + (i.endY - y)**2) > 20;
                if(i.type === 'pencil') return Math.sqrt((i.path[0].x - x)**2 + (i.path[0].y - y)**2) > 30;
                return Math.sqrt((i.x-x)**2 + (i.y-y)**2) > 20;
            });
        };

        document.getElementById('smoke-yellow-btn').onclick = () => items.push({ x: canvas.width / 2, y: canvas.height / 2, type: 'smoke', color: 'yellow', seed: Math.random() * 10 });
        document.getElementById('smoke-blue-btn').onclick = () => items.push({ x: canvas.width / 2, y: canvas.height / 2, type: 'smoke', color: 'blue', seed: Math.random() * 10 });
        document.getElementById('flash-btn').onclick = () => items.push({ x: canvas.width / 2, y: canvas.height / 2, type: 'flash', seed: Math.random() * 10 });
        document.getElementById('clear-btn').onclick = () => items = [];
        document.getElementById('export-btn').onclick = () => {
            const link = document.createElement('a');
            link.download = 'MEERH_Strategy.png';
            link.href = canvas.toDataURL();
            link.click();
        };

        function drawPencil(path, color) {
            ctx.save(); ctx.strokeStyle = color; ctx.globalAlpha = 0.7; ctx.lineWidth = 3;
            ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.shadowBlur = 5; ctx.shadowColor = color;
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
            for(let p of path) ctx.lineTo(p.x, p.y);
            ctx.stroke(); ctx.restore();
        }

        function drawArrow(startX, startY, endX, endY) {
            const headLength = 15;
            const angle = Math.atan2(endY - startY, endX - startX);
            ctx.save(); ctx.strokeStyle = "rgba(255, 255, 255, 0.8)"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headLength * Math.cos(angle - Math.PI / 6), endY - headLength * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headLength * Math.cos(angle + Math.PI / 6), endY - headLength * Math.sin(angle + Math.PI / 6));
            ctx.stroke(); ctx.restore();
        }

        function drawS_Smoke(x, y, seed, color) {
            ctx.save();
            const mainColor = color === 'blue' ? '0, 212, 255' : '252, 241, 74';
            for (let i = 0; i < 5; i++) {
                const angle = (Date.now() / 1000) + (i * 1.2) + seed;
                const ox = Math.cos(angle) * 8; const oy = Math.sin(angle) * 8;
                const size = 30 + Math.sin(angle * 1.5) * 5;
                const grad = ctx.createRadialGradient(x + ox, y + oy, 0, x + ox, y + oy, size);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                grad.addColorStop(0.3, `rgba(${mainColor}, 0.6)`);
                grad.addColorStop(1, `rgba(${mainColor}, 0)`);
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x + ox, y + oy, size, 0, Math.PI * 2); ctx.fill();
            }
            ctx.fillStyle = "black"; ctx.font = "bold 22px Arial"; ctx.textAlign = "center";
            ctx.textBaseline = "middle"; ctx.fillText("S", x, y); ctx.restore();
        }

        function drawFlash(x, y, seed) {
            ctx.save(); const size = 35 + Math.sin(Date.now() / 100 + seed) * 3;
            const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
            grad.addColorStop(0, 'white'); grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center";
            ctx.textBaseline = "middle"; ctx.fillText("F", x, y); ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (mapImage.src) ctx.drawImage(mapImage, 0, 0, canvas.width, canvas.height);
            else { ctx.fillStyle = "#111"; ctx.fillRect(0,0,canvas.width, canvas.height); }

            if (isDrawing) {
                if (tool.startsWith('pencil') && currentPath.length > 0) drawPencil(currentPath, tool === 'pencil-blue' ? '#00d4ff' : '#ff3e3e');
                if (tool === 'arrow' && arrowStart) drawArrow(arrowStart.x, arrowStart.y, currentMousePos.x, currentMousePos.y);
            }

            items.forEach(i => {
                if (i.type === 'pencil') {
                    if ((i.subType === 'pencil-blue' && showPencilBlue) || (i.subType === 'pencil-red' && showPencilRed)) {
                        drawPencil(i.path, i.color);
                    }
                } else if (i.type === 'arrow') {
                    if (showArrows) drawArrow(i.startX, i.startY, i.endX, i.endY);
                } else if (i.type === 'smoke') drawS_Smoke(i.x, i.y, i.seed, i.color);
                else if (i.type === 'flash') drawFlash(i.x, i.y, i.seed);
                else {
                    ctx.beginPath(); ctx.arc(i.x, i.y, 17, 0, Math.PI * 2);
                    ctx.fillStyle = i.team === 'gr' ? 'rgba(0, 212, 255, 0.6)' : 'rgba(255, 62, 62, 0.6)';
                    ctx.strokeStyle = i.team === 'gr' ? '#00d4ff' : '#ff3e3e';
                    ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "white"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
                    ctx.textBaseline = "middle"; ctx.fillText(i.label, i.x, i.y);
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
